description = "檢查程式碼中的潛在 Bug 與邏輯錯誤"
prompt = """
請擔任資深軟體工程師，針對目前的程式碼變更或使用者提供的 {{args}} 進行深度審查。

重點檢查項目：
1. **邏輯錯誤**：是否有未處理的 Edge Cases 或潛在的執行階段錯誤？
2. **最佳實踐**：是否符合 React (TypeScript) 的慣用法？
3. **視覺規範**：組件是否嚴格遵守 `GEMINI.md` 中的莫蘭迪色系（霧藍、亞麻白、柔和炭灰）？
4. **效能優化**：是否有不必要的渲染或效能瓶頸？

請以簡潔的條列方式指出問題，並直接提供修正後的程式碼建議。最後記得稱呼我為 Capitaine。🌟
"""
